<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C5 — Detail Close-up Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; }

    /* C5: 控制面板特写全屏背景 — 极致产品细节，科技感 */
    .hero {
      position: relative;
      width: 100%; height: 100vh; min-height: 680px;
      overflow: hidden;
      display: flex; align-items: center;
    }
    /* 背景：控制面板特写大图 */
    .hero__bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
      filter: brightness(0.55) saturate(1.2);
    }
    /* 多层渐变 */
    .hero__overlay {
      position: absolute; inset: 0;
      background:
        linear-gradient(to right,
          rgba(8,10,14,0.95) 0%,
          rgba(8,10,14,0.75) 35%,
          rgba(8,10,14,0.20) 62%,
          transparent 80%),
        linear-gradient(to top,
          rgba(8,10,14,0.80) 0%,
          transparent 42%),
        linear-gradient(to bottom,
          rgba(8,10,14,0.60) 0%,
          transparent 25%);
    }
    /* 产品小图：右下角悬浮展示 */
    .hero__product-thumb {
      position: absolute;
      bottom: 60px; right: 60px;
      width: 240px; z-index: 3;
      opacity: 0.88;
    }
    .hero__product-thumb img {
      width: 100%; display: block;
      mix-blend-mode: multiply;
      filter: brightness(1.15);
    }
    .hero__product-thumb::before {
      content: 'Full View';
      position: absolute;
      bottom: -18px; right: 0;
      font-size: 8.5px; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(100,140,180,0.45);
    }

    /* 内容 */
    .hero__content {
      position: relative; z-index: 2;
      padding-left: 88px;
      max-width: 560px;
    }
    .hero__kicker {
      font-size: 10px; letter-spacing: 0.50em; text-transform: uppercase;
      color: rgba(100,150,200,0.60); margin-bottom: 22px; font-weight: 400;
    }
    .hero__headline {
      font-size: clamp(36px, 4.8vw, 62px);
      font-weight: 300; color: #E8EEF5;
      line-height: 1.06; letter-spacing: -0.024em; margin-bottom: 26px;
    }
    .hero__headline strong { font-weight: 700; display: block; color: #fff; }
    .hero__detail-note {
      font-size: 12px; letter-spacing: 0.08em;
      color: rgba(100,150,200,0.65); margin-bottom: 40px;
      font-style: italic;
    }
    /* 控制功能列表 */
    .hero__controls {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px 28px; margin-bottom: 44px;
    }
    .hctrl {
      display: flex; align-items: center; gap: 10px;
    }
    .hctrl__dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(100,150,200,0.45); flex-shrink: 0;
    }
    .hctrl__text {
      font-size: 11.5px; color: rgba(200,215,235,0.58);
      letter-spacing: 0.04em;
    }
    /* CTA */
    .hero__btns { display: flex; gap: 12px; margin-bottom: 40px; }
    .btn { font-family:'Inter',sans-serif; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; cursor:pointer; padding:15px 38px; transition:all 0.18s; text-decoration:none; display:inline-block; border:none; }
    .btn--primary { font-weight:700; background:#E8EEF5; color:#08090C; }
    .btn--primary:hover { background:#C4D0E0; }
    .btn--ghost { font-weight:300; background:transparent; color:rgba(200,215,235,0.55); border:1px solid rgba(100,150,200,0.25); }
    .btn--ghost:hover { border-color:rgba(100,150,200,0.55); color:#E8EEF5; }
    /* 价格条 */
    .hero__price-row {
      display: flex; align-items: baseline; gap: 16px;
    }
    .hero__price {
      font-size: 28px; font-weight: 700; color: #E8EEF5; letter-spacing: -0.02em;
    }
    .hero__price-note { font-size: 11px; color: rgba(200,215,235,0.38); letter-spacing: 0.12em; text-transform: uppercase; }

    .variant-tag { position:fixed; top:20px; right:20px; background:rgba(0,0,0,0.75); color:#fff; font-size:11px; font-family:monospace; padding:6px 12px; letter-spacing:0.1em; z-index:9999; }
  </style>
</head>
<body>
<div class="variant-tag">C5 — Detail Close-up Hero</div>
<section class="hero">
  <img class="hero__bg"
    src="产品图片/产品实物照片/894A8964.JPG"
    alt="Opula control panel detail"
  />
  <div class="hero__overlay"></div>
  <div class="hero__product-thumb">
    <img src="产品图片/白底照片/伸缩台灯/多角度/3.jpg" alt="Opula full view" />
  </div>
  <div class="hero__content">
    <p class="hero__kicker">Opula Technology — Precision Controls</p>
    <h1 class="hero__headline">Every detail<strong>matters.</strong></h1>
    <p class="hero__detail-note">Touch panel · 6-function · Offline voice mic · Brushed aluminum</p>
    <div class="hero__controls">
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">On / Off</span></div>
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">Brighten / Dim</span></div>
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">Color Temperature</span></div>
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">Reading Mode</span></div>
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">Timer Function</span></div>
      <div class="hctrl"><span class="hctrl__dot"></span><span class="hctrl__text">"Hello Star" Mic</span></div>
    </div>
    <div class="hero__btns">
      <a href="#" class="btn btn--primary">Shop Now</a>
      <button class="btn btn--ghost">▶ See Full Specs</button>
    </div>
    <div class="hero__price-row">
      <span class="hero__price">$149.99</span>
      <span class="hero__price-note">Free Shipping · 30-Day Returns</span>
    </div>
  </div>
</section>
</body>
</html>
